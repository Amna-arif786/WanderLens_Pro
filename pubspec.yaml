name: wanderlens
description: "Embark on a visual adventure with \"WanderLens,\" a Flutter-powered social app where users share breathtaking travel moments, authenticate landmarks with Gemini API, and curate personalized wishlists of dream destinations."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Core
  firebase_core: ^4.3.0
  # Firebase Authentication
  firebase_auth: ^6.1.3
  # Cloud Firestore Database (For Profile Data)
  cloud_firestore: ^6.1.1

  # Google Sign In
  google_sign_in: ^7.2.0
  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  provider: ^6.1.2 
  
  # Image Handling & Storage
  image_picker: ^1.1.2
  cloudinary_public: 0.23.1
  
  # Utilities
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shared_preferences: ^2.0.0
  http: ^1.0.0
  uuid: ^4.0.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  crypto: ^3.0.3 # Added for secure hashing

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/google_Icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/Wanderlense.png
  remove_alpha_ios: true
